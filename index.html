<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>금릉 RPG - 로딩중</title>
    <style>
        body {
            margin: 0; background-color: #0b0b16; color: #fff;
            font-family: 'Malgun Gothic', sans-serif; display: flex;
            justify-content: center; align-items: center; height: 100vh;
            overflow: hidden; user-select: none; -webkit-user-select: none;
        }
        #loadingScreen {
            text-align: center; cursor: pointer; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
        }
        .game-title {
            font-size: 28px; font-weight: bold; color: #60a5fa;
            margin-bottom: 10px; text-shadow: 0 0 10px rgba(96,165,250,0.5);
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.1); width: 60px; height: 60px;
            border-radius: 50%; border-left-color: #3b82f6; animation: spin 1s linear infinite;
            margin-bottom: 25px; box-shadow: 0 0 15px rgba(59,130,246,0.3);
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #percentText { font-size: 24px; color: #f8fafc; font-weight: bold; margin-bottom: 5px; }
        .sub-text { font-size: 14px; color: #94a3b8; }

        #scare {
            display: none; position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh; background-color: black; z-index: 9999;
        }
        #scare img { width: 100%; height: 100%; object-fit: cover; }
        
        /* 초고속으로 화면이 덜덜덜덜 떨리는 킹받는 진동 효과 */
        .crazy-shake { animation: crazyShake 0.05s infinite alternate; }
        @keyframes crazyShake {
            0% { transform: translate(6px, 6px) scale(1.05); }
            100% { transform: translate(-6px, -6px) scale(1.05); }
        }
    </style>
</head>
<body>

    <div id="loadingScreen" onclick="startLoading()">
        <div class="spinner"></div>
        <div class="game-title">금릉 RPG 온라인</div>
        <div id="percentText">클릭하여 게임 시작 (0%)</div>
        <div class="sub-text" id="statusText">리소스를 구성하는 중입니다...</div>
    </div>

    <div id="scare">
        <img src="귀신 사진.png" alt="scare">
        <audio id="scareSound" src="비명.mp3" preload="auto" loop></audio>
    </div>

    <script>
        var isStarted = false;

        function startLoading() {
            if (isStarted) return; // 중복 실행 차단
            isStarted = true;

            var percentText = document.getElementById('percentText');
            var statusText = document.getElementById('statusText');
            var sound = document.getElementById('scareSound');
            var count = 0;

            // [버그 수정 포인트] 터치하자마자 브라우저한테 오디오 재생 허가를 먼저 받아냄!
            sound.play().then(function() {
                sound.pause(); // 일단 허가만 받고 로딩 동안은 잠깐 끔
                sound.currentTime = 0;
            }).catch(function(e) { console.log(e); });

            statusText.innerText = "서버 데이터를 동기화하는 중...";

            // 숫자가 1%부터 100%까지 정상적으로 굴러가게 만드는 핵심 타이머
            var interval = setInterval(function() {
                // 한 번에 2~5%씩 불규칙하게 올라가서 진짜 로딩같긔
                count += Math.floor(Math.random() * 4) + 2; 
                
                if (count >= 100) {
                    count = 100;
                    clearInterval(interval);
                    percentText.innerText = "로딩 완료! (100%)";
                    statusText.innerText = "월드에 진입하는 중...";
                    
                    // 100% 도달하고 0.2초 뒤에 낚시 폭발!!
                    setTimeout(triggerScare, 200);
                } else {
                    percentText.innerText = "로딩 중... (" + count + "%)";
                    if (count > 30 && count < 60) statusText.innerText = "맵 리소스를 불러오는 중...";
                    if (count >= 60 && count < 90) statusText.innerText = "플레이어 정보를 동기화하는 중...";
                    if (count >= 90) statusText.innerText = "렌더링 파이프라인 최적화 중...";
                }
            }, 50); // 숫자가 올라가는 간격 조절슨
        }

        function triggerScare() {
            var sound = document.getElementById('scareSound');
            var scareDiv = document.getElementById('scare');
            var docElm = document.documentElement;

            // 노래 무한 반복 강제 주입하긔
            sound.loop = true;

            // 모바일/PC 상관없이 주소창 날려버리는 전체화면 뽷!!
            if (docElm.requestFullscreen) {
                docElm.requestFullscreen();
            } else if (docElm.webkitRequestFullscreen) {
                docElm.webkitRequestFullscreen();
            } else if (docElm.msRequestFullscreen) {
                docElm.msRequestFullscreen();
            }
            
            // 화면 지진 효과 적용
            document.body.classList.add('crazy-shake');
            
            // 귀신 사진 띄우고 무한 비명 발사!!
            scareDiv.style.display = 'block';
            sound.play();
        }
    </script>
</body>
</html>
