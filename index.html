<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>콘텐츠 로딩 중</title>
<style>
body {
    margin: 0;
    background: #000;
    overflow: hidden;
    height: 100vh;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
}
#clickOverlay {
    position: fixed;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #000;
    color: #fff;
    font-family: sans-serif;
    z-index: 9999;
}
#loadingScreen {
    position: fixed;
    inset: 0;
    display: none; 
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: #000;
    color: #fff;
    font-family: sans-serif;
    z-index: 9998;
}
#barWrap {
    width: 260px; height: 16px; border: 1px solid #fff; margin-top: 15px;
}
#bar {
    width: 0%; height: 100%; background: #fff;
}
#scareContent {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9997;
}
#scareContent img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.shake {
    animation: shake .08s infinite;
}
@keyframes shake {
    0% { transform: translate(3px, 2px); }
    25% { transform: translate(-3px, -2px); }
    50% { transform: translate(2px, -3px); }
    75% { transform: translate(-2px, 3px); }
    100% { transform: translate(3px, -2px); }
}
</style>
</head>
<body>

<div id="clickOverlay">
    <h2>화면을 클릭하면 시작됩니다</h2>
</div>

<div id="loadingScreen">
    <h2 id="percent">로딩중... 0%</h2>
    <div id="barWrap"><div id="bar"></div></div>
</div>

<div id="scareContent">
    <img src="Gemini_Generated_Image_egtwapegtwapegtw.png" alt="image">
</div>

<audio id="screamSound" src="비명.mp4" preload="auto" loop playsinline></audio>

<script>
const overlay = document.getElementById('clickOverlay');
const loading = document.getElementById('loadingScreen');
const scare = document.getElementById('scareContent');
const audio = document.getElementById('screamSound');

const startEvents = ['touchstart', 'click'];

startEvents.forEach(evt => {
    overlay.addEventListener(evt, handleStart, { once: true });
});

function handleStart(e) {
    e.preventDefault();

    // 터치 즉시 미디어 락 해제
    audio.play().then(() => {
        audio.pause();
    }).catch(err => console.log(err));

    // 전체화면 요청
    const docEl = document.documentElement;
    if (docEl.requestFullscreen) {
        docEl.requestFullscreen().catch(() => {});
    } else if (docEl.webkitRequestFullscreen) {
        docEl.webkitRequestFullscreen().catch(() => {});
    }

    overlay.style.display = 'none';
    loading.style.display = 'flex';

    runLoading();
}

async function runLoading() {
    for (let i = 0; i <= 100; i++) {
        document.getElementById('percent').textContent = '로딩중... ' + i + '%';
        document.getElementById('bar').style.width = i + '%';
        await new Promise(r => setTimeout(r, 25));
    }

    loading.style.display = 'none';
    scare.style.display = 'block';
    document.body.classList.add('shake');

    if (navigator.vibrate) {
        navigator.vibrate([800, 150, 800, 150, 800]);
    }

    audio.volume = 1.0;
    audio.currentTime = 0;
    audio.play().catch(err => console.log(err));
}
</script>

</body>
</html>
